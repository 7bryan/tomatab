<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <link href="./dist/output.css" rel="stylesheet">
</head>

<body class="w-[320px] bg-slate-900 text-slate-100 font-sans p-4 antialiased selection:bg-brand-primary/30">

  <div class="flex flex-col gap-3">
    <div class="flex items-center justify-between">
      <h1 class="text-lg font-bold tracking-wide text-brand-primary flex items-center gap-1.5">
        <span></span> Tomotab
      </h1>
      <button id="settingsBtn" class="text-xs text-slate-400 hover:text-slate-200 transition-colors cursor-pointer">
        Settings ⚙️
      </button>
    </div>

    <input type="text" id="taskInput" placeholder="What are you working on?"
      class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-brand-primary transition-colors" />
  </div>

  <div class="my-6 text-center">
    <div id="timerLabel" class="text-xs uppercase tracking-widest text-slate-400 font-semibold mb-1">Work Session</div>
    <div id="timerDisplay"
      class="text-5xl font-black font-mono tracking-tight text-slate-50 drop-shadow-[0_4px_12px_rgba(255,87,51,0.15)]">
      25:00
    </div>
  </div>

  <div class="flex gap-2">
    <button id="startStopBtn"
      class="flex-1 bg-brand-primary hover:opacity-90 active:scale-[0.98] text-white font-medium text-sm py-2.5 px-4 rounded-lg shadow-md transition-all cursor-pointer">
      Start
    </button>
    <button id="resetBtn"
      class="bg-slate-800 hover:bg-slate-700 active:scale-[0.98] border border-slate-700 text-slate-300 font-medium text-sm py-2.5 px-4 rounded-lg transition-all cursor-pointer">
      Reset
    </button>
  </div>

  <div id="settingsPanel" class="hidden mt-4 pt-4 border-t border-slate-800 flex flex-col gap-3">
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-[11px] font-medium uppercase text-slate-400 mb-1">Work (Mins)</label>
        <input type="number" id="workDuration" value="25" min="1" max="60"
          class="w-full bg-slate-800 border border-slate-700 rounded-md p-1.5 text-center text-sm focus:outline-none focus:border-brand-primary" />
      </div>
      <div>
        <label class="block text-[11px] font-medium uppercase text-slate-400 mb-1">Break (Mins)</label>
        <input type="number" id="breakDuration" value="5" min="1" max="60"
          class="w-full bg-slate-800 border border-slate-700 rounded-md p-1.5 text-center text-sm focus:outline-none focus:border-brand-primary" />
      </div>
    </div>
    <button id="saveSettingsBtn"
      class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-semibold py-2 rounded-md transition-colors cursor-pointer">
      Apply Settings
    </button>
  </div>
  <!-- your UI -->

  <script src="dist/popup.js"></script>
</body>

</html>
